<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stackly</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#000;
overflow:hidden;
}

/* INTRO SCREEN */

.intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#000;
z-index:9999;
flex-direction:column;
animation:fadeOut 1s ease forwards;
animation-delay:4s;
}

/* LOGO */

.logo{
width:160px;
animation:logoZoom 3s ease forwards;
}

/* TAGLINE */

.tagline{
color:#cbd5f5;
margin-top:20px;
letter-spacing:2px;
font-size:14px;
opacity:0;
animation:tagFade 2s ease forwards;
animation-delay:1.5s;
}

/* LOGO ANIMATION */

@keyframes logoZoom{

0%{
transform:scale(0.3);
opacity:0;
filter:blur(20px);
}

40%{
opacity:1;
filter:blur(0);
}

70%{
transform:scale(1.1);
filter:drop-shadow(0 0 20px #8b5cf6);
}

100%{
transform:scale(1);
filter:drop-shadow(0 0 35px #3b82f6);
}

}

/* TAGLINE FADE */

@keyframes tagFade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* FADE OUT SCREEN */

@keyframes fadeOut{

to{
opacity:0;
visibility:hidden;
}

}

</style>
</head>


<body>

<!-- INTRO SCREEN -->

<div class="intro">

<img src="logo.webp" class="logo">

<p class="tagline">STREAM • DISCOVER • ENJOY</p>

</div>


<script>

/* REDIRECT TO HOME */

setTimeout(function(){

window.location.href="home.html";

},4500);

</script>

</body>
</html>
